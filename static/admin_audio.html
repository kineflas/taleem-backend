<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taliem — Admin Audio Recorder</title>
<style>
  :root {
    --bg: #f8f9fa; --card: #ffffff; --primary: #2A9D8F;
    --primary-dark: #21867a; --danger: #e76f51; --success: #2a9d8f;
    --text: #1a1a2e; --text-muted: #6b7280; --border: #e5e7eb;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); }

  /* ── Login overlay ─── */
  #login-overlay {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  .login-card {
    background: var(--card); border-radius: var(--radius); padding: 40px;
    box-shadow: 0 4px 24px rgba(0,0,0,.08); max-width: 400px; width: 90%;
    text-align: center;
  }
  .login-card h1 { font-size: 24px; margin-bottom: 8px; color: var(--primary); }
  .login-card p { color: var(--text-muted); margin-bottom: 24px; font-size: 14px; }
  .login-card input {
    width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 8px;
    font-size: 14px; margin-bottom: 12px; outline: none;
  }
  .login-card input:focus { border-color: var(--primary); }
  .login-card button {
    width: 100%; padding: 12px; background: var(--primary); color: #fff;
    border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: background .2s;
  }
  .login-card button:hover { background: var(--primary-dark); }
  .login-error { color: var(--danger); font-size: 13px; margin-top: 8px; display: none; }

  /* ── Header ─── */
  header {
    background: linear-gradient(135deg, #264653, #2A9D8F); color: #fff;
    padding: 20px 24px; position: sticky; top: 0; z-index: 10;
    box-shadow: 0 2px 12px rgba(0,0,0,.1);
  }
  header h1 { font-size: 20px; margin-bottom: 4px; }
  .stats-bar {
    display: flex; gap: 20px; margin-top: 10px; font-size: 14px; flex-wrap: wrap;
  }
  .stat { display: flex; align-items: center; gap: 6px; }
  .stat-num { font-weight: 700; font-size: 18px; }
  .progress-bar-outer {
    width: 100%; height: 6px; background: rgba(255,255,255,.2);
    border-radius: 3px; margin-top: 10px; overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%; background: #e9c46a; border-radius: 3px; transition: width .5s;
  }

  /* ── Filters ─── */
  .filters {
    display: flex; gap: 10px; padding: 16px 24px; flex-wrap: wrap;
    background: var(--card); border-bottom: 1px solid var(--border);
    position: sticky; top: 80px; z-index: 9;
  }
  .filter-btn {
    padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--card); font-size: 13px; cursor: pointer; font-weight: 500;
    transition: all .2s;
  }
  .filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .filter-btn:hover:not(.active) { border-color: var(--primary); color: var(--primary); }
  .search-input {
    flex: 1; min-width: 200px; padding: 8px 14px; border: 1px solid var(--border);
    border-radius: 20px; font-size: 13px; outline: none;
  }
  .search-input:focus { border-color: var(--primary); }

  /* ── Content ─── */
  main { max-width: 900px; margin: 0 auto; padding: 20px 16px; }

  .group-section { margin-bottom: 28px; }
  .group-header {
    font-size: 16px; font-weight: 700; color: var(--primary);
    padding: 10px 0; border-bottom: 2px solid var(--primary);
    margin-bottom: 12px; display: flex; justify-content: space-between;
    align-items: center;
  }
  .group-count { font-size: 12px; font-weight: 500; color: var(--text-muted); }

  /* ── Audio item card ─── */
  .audio-item {
    display: flex; align-items: center; gap: 14px;
    padding: 14px; margin-bottom: 8px;
    background: var(--card); border-radius: var(--radius);
    border: 1px solid var(--border); transition: box-shadow .2s;
  }
  .audio-item:hover { box-shadow: 0 2px 12px rgba(0,0,0,.06); }
  .audio-item.recorded { border-left: 3px solid var(--success); }
  .audio-item.missing { border-left: 3px solid var(--danger); }

  .item-info { flex: 1; min-width: 0; }
  .item-id { font-weight: 600; font-size: 14px; word-break: break-all; }
  .item-context { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .item-arabic {
    font-family: 'Amiri', 'Traditional Arabic', serif;
    font-size: 18px; direction: rtl; color: var(--text); margin-top: 4px;
  }

  .item-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

  .btn {
    padding: 8px 14px; border: none; border-radius: 8px; font-size: 13px;
    font-weight: 600; cursor: pointer; display: inline-flex; align-items: center;
    gap: 5px; transition: all .2s;
  }
  .btn-record { background: var(--danger); color: #fff; }
  .btn-record:hover { background: #d35a41; }
  .btn-record.recording { background: #c0392b; animation: pulse 1s infinite; }
  .btn-stop { background: #333; color: #fff; }
  .btn-play { background: #264653; color: #fff; }
  .btn-play:hover { background: #1d3a47; }
  .btn-upload { background: var(--success); color: #fff; }
  .btn-upload:hover { background: var(--primary-dark); }
  .btn-delete { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 6px 10px; }
  .btn-delete:hover { background: var(--danger); color: #fff; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }

  .status-badge {
    font-size: 11px; padding: 3px 8px; border-radius: 12px; font-weight: 600;
  }
  .badge-ok { background: #d1fae5; color: #065f46; }
  .badge-missing { background: #fee2e2; color: #991b1b; }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .7; } }

  /* ── Toast ─── */
  .toast {
    position: fixed; bottom: 24px; right: 24px; padding: 14px 20px;
    background: #333; color: #fff; border-radius: 10px; font-size: 14px;
    box-shadow: 0 4px 16px rgba(0,0,0,.15); transform: translateY(100px);
    opacity: 0; transition: all .3s; z-index: 50;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { background: var(--danger); }
  .toast.success { background: var(--success); }

  /* ── Responsive ─── */
  @media (max-width: 600px) {
    .audio-item { flex-direction: column; align-items: flex-start; }
    .item-actions { width: 100%; justify-content: flex-start; margin-top: 8px; }
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">
</head>
<body>

<!-- Login Overlay -->
<div id="login-overlay">
  <div class="login-card">
    <h1>Taliem Audio Admin</h1>
    <p>Connectez-vous avec votre compte Taliem pour accéder au studio d'enregistrement.</p>
    <input type="email" id="login-email" placeholder="Email" autocomplete="email">
    <input type="password" id="login-password" placeholder="Mot de passe" autocomplete="current-password">
    <button id="login-btn" onclick="doLogin()">Se connecter</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- Main App (hidden until logged in) -->
<div id="app" style="display:none">
  <header>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h1>Studio d'enregistrement audio</h1>
      <button class="btn" style="background:rgba(255,255,255,.2);color:#fff;font-size:12px" onclick="doLogout()">Déconnexion</button>
    </div>
    <div class="stats-bar">
      <div class="stat"><span class="stat-num" id="stat-total">0</span> Total</div>
      <div class="stat"><span class="stat-num" id="stat-done">0</span> Enregistrés</div>
      <div class="stat"><span class="stat-num" id="stat-missing">0</span> Manquants</div>
    </div>
    <div class="progress-bar-outer"><div class="progress-bar-inner" id="progress-bar" style="width:0%"></div></div>
  </header>

  <div class="filters">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">Tous</button>
    <button class="filter-btn" data-filter="missing" onclick="setFilter('missing', this)">Manquants</button>
    <button class="filter-btn" data-filter="recorded" onclick="setFilter('recorded', this)">Enregistrés</button>
    <input class="search-input" type="text" placeholder="Rechercher un audio_id..." oninput="applySearch(this.value)">
  </div>

  <main id="main-content">
    <p style="text-align:center;padding:40px;color:var(--text-muted)">Chargement...</p>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ──
let TOKEN = localStorage.getItem('taliem_token') || '';
let API_BASE = 'https://api.taleem.cksyndic.ma';
let audioData = [];   // flat list of all items
let groupedData = []; // grouped by source
let currentFilter = 'all';
let searchQuery = '';

// Active recording state
let mediaRecorder = null;
let recordedChunks = [];
let currentRecordingId = null;

// ── Auth ──
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';

  if (!email || !password) {
    errEl.textContent = 'Email et mot de passe requis';
    errEl.style.display = 'block';
    return;
  }

  try {
    const res = await fetch(`${API_BASE}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      throw new Error(data.detail || 'Identifiants incorrects');
    }
    const data = await res.json();
    TOKEN = data.access_token;
    localStorage.setItem('taliem_token', TOKEN);
    showApp();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  }
}

function doLogout() {
  TOKEN = '';
  localStorage.removeItem('taliem_token');
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-overlay').style.display = 'flex';
}

async function showApp() {
  document.getElementById('login-overlay').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  await loadStatus();
}

// Auto-login if token exists
if (TOKEN) {
  showApp();
}

// Allow Enter key on login
document.getElementById('login-password').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doLogin();
});

// ── Load status ──
async function loadStatus() {
  try {
    const res = await fetch(`${API_BASE}/api/admin/audio/status`, {
      headers: { 'Authorization': `Bearer ${TOKEN}` },
    });
    if (res.status === 401 || res.status === 403) {
      doLogout();
      toast('Session expirée — reconnectez-vous', 'error');
      return;
    }
    if (!res.ok) throw new Error('Erreur serveur');
    const data = await res.json();

    document.getElementById('stat-total').textContent = data.total;
    document.getElementById('stat-done').textContent = data.recorded;
    document.getElementById('stat-missing').textContent = data.missing;
    const pct = data.total > 0 ? ((data.recorded / data.total) * 100).toFixed(1) : 0;
    document.getElementById('progress-bar').style.width = pct + '%';

    groupedData = data.groups;
    audioData = data.groups.flatMap(g => g.items.map(i => ({ ...i, group: g.group })));
    renderItems();
  } catch (e) {
    document.getElementById('main-content').innerHTML =
      `<p style="text-align:center;padding:40px;color:var(--danger)">Erreur: ${e.message}</p>`;
  }
}

// ── Render ──
function renderItems() {
  const main = document.getElementById('main-content');
  main.innerHTML = '';

  for (const group of groupedData) {
    const items = group.items.filter(item => {
      if (currentFilter === 'missing' && item.recorded) return false;
      if (currentFilter === 'recorded' && !item.recorded) return false;
      if (searchQuery && !item.audio_id.toLowerCase().includes(searchQuery) &&
          !item.context.toLowerCase().includes(searchQuery)) return false;
      return true;
    });

    if (items.length === 0) continue;

    const recorded = items.filter(i => i.recorded).length;
    const section = document.createElement('div');
    section.className = 'group-section';
    section.innerHTML = `
      <div class="group-header">
        <span>${formatGroupName(group.group)}</span>
        <span class="group-count">${recorded}/${items.length} enregistrés</span>
      </div>
    `;

    for (const item of items) {
      section.appendChild(createItemCard(item));
    }
    main.appendChild(section);
  }

  if (main.children.length === 0) {
    main.innerHTML = '<p style="text-align:center;padding:40px;color:var(--text-muted)">Aucun élément trouvé.</p>';
  }
}

function formatGroupName(name) {
  // "odyssee/lesson_1" → "Odyssée — Leçon 1"
  return name.replace('odyssee/lesson_', 'Odyssée des Lettres — Leçon ');
}

function createItemCard(item) {
  const div = document.createElement('div');
  div.className = `audio-item ${item.recorded ? 'recorded' : 'missing'}`;
  div.id = `item-${item.audio_id}`;

  div.innerHTML = `
    <div class="item-info">
      <div class="item-id">${item.audio_id}</div>
      <div class="item-context">${item.context}</div>
      ${item.text_ar ? `<div class="item-arabic">${item.text_ar}</div>` : ''}
    </div>
    <div class="item-actions" id="actions-${item.audio_id}">
      ${item.recorded
        ? `<span class="status-badge badge-ok">OK</span>
           <button class="btn btn-play" onclick="playExisting('${item.audio_id}')">Lire</button>
           <button class="btn btn-record" onclick="startRecord('${item.audio_id}')">Re-enregistrer</button>
           <button class="btn btn-delete" onclick="deleteAudio('${item.audio_id}')">Suppr.</button>`
        : `<span class="status-badge badge-missing">Manquant</span>
           <button class="btn btn-record" onclick="startRecord('${item.audio_id}')">Enregistrer</button>`
      }
    </div>
  `;
  return div;
}

// ── Filters ──
function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderItems();
}

function applySearch(q) {
  searchQuery = q.toLowerCase().trim();
  renderItems();
}

// ── Recording ──
async function startRecord(audioId) {
  // Stop any existing recording
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }

  currentRecordingId = audioId;
  recordedChunks = [];

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });

    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) recordedChunks.push(e.data);
    };

    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      showRecordedActions(audioId);
    };

    mediaRecorder.start();
    showRecordingUI(audioId);
  } catch (e) {
    toast("Erreur micro: " + e.message, 'error');
  }
}

function stopRecord() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
}

function showRecordingUI(audioId) {
  const actions = document.getElementById(`actions-${audioId}`);
  if (!actions) return;
  actions.innerHTML = `
    <span style="color:var(--danger);font-weight:600;font-size:13px;animation:pulse 1s infinite">
      Enregistrement en cours...
    </span>
    <button class="btn btn-stop" onclick="stopRecord()">Stop</button>
  `;
}

function showRecordedActions(audioId) {
  const actions = document.getElementById(`actions-${audioId}`);
  if (!actions) return;
  actions.innerHTML = `
    <button class="btn btn-play" onclick="playRecorded()">Réécouter</button>
    <button class="btn btn-record" onclick="startRecord('${audioId}')">Refaire</button>
    <button class="btn btn-upload" onclick="uploadRecorded('${audioId}')">Valider &amp; Envoyer</button>
  `;
}

function playRecorded() {
  if (recordedChunks.length === 0) return;
  const blob = new Blob(recordedChunks, { type: 'audio/webm' });
  const url = URL.createObjectURL(blob);
  const audio = new Audio(url);
  audio.play();
  audio.onended = () => URL.revokeObjectURL(url);
}

function playExisting(audioId) {
  const audio = new Audio(`${API_BASE}/static/audio/${audioId}.mp3`);
  audio.play().catch(() => {
    // Try letters sub-directory
    const audio2 = new Audio(`${API_BASE}/static/audio/letters/${audioId}.mp3`);
    audio2.play().catch(() => toast('Fichier audio introuvable', 'error'));
  });
}

// ── Upload ──
async function uploadRecorded(audioId) {
  if (recordedChunks.length === 0) {
    toast('Aucun enregistrement', 'error');
    return;
  }

  const blob = new Blob(recordedChunks, { type: 'audio/webm' });
  const formData = new FormData();
  formData.append('file', blob, `${audioId}.webm`);

  const actions = document.getElementById(`actions-${audioId}`);
  if (actions) actions.innerHTML = '<span style="color:var(--text-muted)">Envoi...</span>';

  try {
    const res = await fetch(`${API_BASE}/api/admin/audio/${audioId}`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${TOKEN}` },
      body: formData,
    });
    if (res.status === 401 || res.status === 403) {
      doLogout();
      return;
    }
    if (!res.ok) {
      const d = await res.json().catch(() => ({}));
      throw new Error(d.detail || 'Erreur serveur');
    }

    toast(`Audio "${audioId}" enregistré avec succès !`, 'success');

    // Update local state & re-render
    const item = audioData.find(i => i.audio_id === audioId);
    if (item) item.recorded = true;
    for (const g of groupedData) {
      const gi = g.items.find(i => i.audio_id === audioId);
      if (gi) gi.recorded = true;
    }
    updateStats();
    renderItems();

  } catch (e) {
    toast(`Erreur: ${e.message}`, 'error');
    showRecordedActions(audioId);
  }
}

// ── Delete ──
async function deleteAudio(audioId) {
  if (!confirm(`Supprimer l'enregistrement "${audioId}" ?`)) return;

  try {
    const res = await fetch(`${API_BASE}/api/admin/audio/${audioId}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${TOKEN}` },
    });
    if (!res.ok) throw new Error('Erreur');

    toast(`Audio "${audioId}" supprimé`, 'success');
    const item = audioData.find(i => i.audio_id === audioId);
    if (item) item.recorded = false;
    for (const g of groupedData) {
      const gi = g.items.find(i => i.audio_id === audioId);
      if (gi) gi.recorded = false;
    }
    updateStats();
    renderItems();
  } catch (e) {
    toast(`Erreur: ${e.message}`, 'error');
  }
}

// ── Stats ──
function updateStats() {
  const total = audioData.length;
  const done = audioData.filter(i => i.recorded).length;
  const missing = total - done;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-missing').textContent = missing;
  const pct = total > 0 ? ((done / total) * 100).toFixed(1) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
}

// ── Toast ──
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ` ${type}` : '');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => { el.className = 'toast'; }, 3500);
}
</script>
</body>
</html>
